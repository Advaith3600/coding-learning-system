services:
  piston-setup:
    image: ghcr.io/engineer-man/piston:latest
    restart: "no"
    networks:
      - judge0_net
    privileged: true
    security_opt:
      - seccomp=unconfined
    volumes:
      - ${DB_VOLUMES_BASE:-./data}/piston-data:/piston
      - ./next-app/scripts/piston-setup.js:/setup/piston-setup.js:ro
    depends_on:
      piston:
        condition: service_healthy
    command: ["node", "/setup/piston-setup.js"]

  piston:
    image: ghcr.io/engineer-man/piston:latest
    restart: always
    networks:
      - judge0_net
    # Piston uses container sandboxing; these opts help in some Docker setups.
    privileged: true
    security_opt:
      - seccomp=unconfined
    volumes:
      - ${DB_VOLUMES_BASE:-./data}/piston-data:/piston
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const http=require('http');const req=http.request({host:'127.0.0.1',port:2000,path:'/api/v2/runtimes',method:'GET'},(res)=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.end();\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  app-db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${APP_POSTGRES_PASSWORD}
    volumes:
      - ${DB_VOLUMES_BASE:-./data}/app-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - judge0_net

  next-app:
    build:
      context: ./next-app
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env
    environment:
      APP_DATABASE_URL: postgres://app:${APP_POSTGRES_PASSWORD}@app-db:5432/app
    depends_on:
      piston:
        condition: service_healthy
      app-db:
        condition: service_healthy
    networks:
      - judge0_net
      - coding-learning-network

networks:
  judge0_net:
  coding-learning-network:
    external: ${CODING_LEARNING_NETWORK_EXTERNAL:-false}
